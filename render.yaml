services:
  # Backend Web Service
  - type: web
    name: bizuplift-backend
    env: node
    rootDir: BizUplift-backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false # Set in Render Dashboard
      - key: JWT_SECRET
        sync: false # Set in Render Dashboard
      - key: FRONTEND_URL
        sync: false # Set in Render Dashboard (the URL of the static site)

  # Frontend Static Site
  - type: static
    name: bizuplift-frontend
    env: static
    rootDir: BizUplift-main
    buildCommand: npm install && npm run build
    publishDir: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        sync: false # Set in Render Dashboard (pointing to backend URL + /api)
