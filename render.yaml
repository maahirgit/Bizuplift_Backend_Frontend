services:
  # Backend Web Service
  - type: web
    name: bizuplift-backend
    env: node
    plan: free
    rootDir: BizUplift-backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        value: bizuplift_prod_jwt_secret_2024
      - key: FRONTEND_URL
        value: https://bizuplift-frontend.onrender.com
      - key: RAZORPAY_KEY_ID
        value: rzp_test_dummykey
      - key: RAZORPAY_KEY_SECRET
        value: dummysecret

  # Frontend Static Site
  - type: static
    name: bizuplift-frontend
    rootDir: BizUplift-main
    buildCommand: npm install && npm run build
    publishDir: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        value: https://bizuplift-backend.onrender.com/api
